name: AMC Strict Render

on:
  push:
  pull_request:

jobs:
  amc-render:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout (with Git LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: manus-ui/pnpm-lock.yaml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install JS dependencies
        run: pnpm --dir manus-ui install --frozen-lockfile

      - name: Install docxtpl
        run: python -m pip install --upgrade pip docxtpl

      - name: Strict render (single)
        run: |
          pnpm --dir manus-ui exec tsx ../scripts/run_amc_report.ts \
            --strict-undeclared \
            --out "${GITHUB_WORKSPACE}/output/AMC_Report_ci_single.docx" \
            --payload "${GITHUB_WORKSPACE}/output/amc_docx_payload_ci_single.json"

      - name: Strict render (comparative)
        run: |
          pnpm --dir manus-ui exec tsx ../scripts/run_amc_report.ts \
            --comparative \
            --strict-undeclared \
            --out "${GITHUB_WORKSPACE}/output/AMC_Report_ci_comparative.docx" \
            --payload "${GITHUB_WORKSPACE}/output/amc_docx_payload_ci_comparative.json"

      - name: Render golden fixture set
        run: bash scripts/render_golden_fixtures.sh

      - name: Upload AMC render artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: amc-render-${{ github.run_id }}
          path: |
            output/AMC_Report_ci_single.docx
            output/AMC_Report_ci_comparative.docx
            output/amc_docx_payload_ci_single.json
            output/amc_docx_payload_ci_comparative.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload AMC golden review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: amc-golden-${{ github.run_id }}
          path: output/golden/
          if-no-files-found: error
          retention-days: 14
